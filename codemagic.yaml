workflows:
  ios-release:
    name: "iOS"
    max_build_duration: 120
    environment:
      flutter: stable
      xcode: latest
      java: 17
      cocoapods: default
      vars:
        BUNDLE_ID: "com.example.smartbin"
        CERTIFICATE_PATH: $CM_CERTIFICATE_PATH
        CERTIFICATE_PASSWORD: $CM_CERTIFICATE_PASSWORD
        PROVISIONING_PROFILE_PATH: $CM_PROVISIONING_PROFILE_PATH

    scripts:
      - echo "🔧 Setting up code signing..."
      - keychain initialize
      - security create-keychain -p "" build.keychain
      - security default-keychain -s build.keychain
      - security unlock-keychain -p "" build.keychain
      - security import $CERTIFICATE_PATH -P $CERTIFICATE_PASSWORD -A
      - security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "" build.keychain
      - cp $PROVISIONING_PROFILE_PATH ~/Library/MobileDevice/Provisioning\ Profiles/

      - name: Verify Flutter Environment
        run: flutter doctor -v

      - name: Clean Derived Data
        run: |
          rm -rf ~/Library/Developer/Xcode/DerivedData

      - name: Clean and Fetch Dependencies
        run: |
          flutter clean
          flutter pub get

      - name: Install CocoaPods
        run: pod install --repo-update
        working-directory: ios

      - name: Build iOS IPA
        run: |
          set -e  # Fail immediately if any command fails
          flutter build ipa --release --export-options-plist=ios/exportOptions.plist

      - name: Debug IPA Path
        run: ls -R build/ios/ipa/

      - name: Upload IPA to Codemagic Artifacts
        artifacts:
          - build/ios/iphoneos/*.ipa

      - name: Upload IPA to GitHub Release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: build/ios/ipa/*.ipa
          tag: v1.0
          overwrite: true
          body: "🚀 New iOS Release!"

      - name: Send Email with IPA
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "🚀 New iOS Build Available!"
          body: "Your latest .ipa build is attached."
          to: "ramos.marklawrence.03042002@gmail.com"
          from: "Codemagic CI"
          attachments: build/ios/ipa/*.ipa

      - name: Debug Email Log
        run: echo "Email sent successfully"
