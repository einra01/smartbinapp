workflows:


name: iOS-ipa-build

on:
  workflow_dispatch:
  flutter_workflow:
    name: "Flutter"
    max_build_duration: 120
    environment:
      flutter: stable           # Use 'stable' or specify a version like '3.16.0'
      xcode: latest             # Latest Xcode for iOS builds
      java: 17                  # Java version compatible with Flutter
      vars:
        PACKAGE_NAME: "com.example.smartbin"  # Your Android app ID
jobs:
  build-ios:
    name: 🎉 iOS Build
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v3

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          architecture: x64

      - run: flutter pub get

      - run: pod repo update
        working-directory: ios

      - run: flutter build ipa --release --export-options-plist=ios/exportOptions.plist

      - name: Debug IPA Path
        run: ls -R build/ios/ipa

      - name: Upload binaries to release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: build/ios/ipa/*.ipa
          tag: v1.0
          overwrite: true
          body: "This is first release"

      - name: Send Email with IPA
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "🚀 New iOS Build Available!"
          body: "Your latest .ipa build is attached."
          to: "ramos.marklawrence.03042002@gmail.com"
          from: "Codemagic CI"
          attachments: build/ios/ipa/*.ipa

      - name: Debug Email Log
        run: echo "Email sent successfully"
