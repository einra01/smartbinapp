workflows:
  ios-release:
    name: "iOS Build"
    max_build_duration: 120
    environment:
      flutter: stable
      xcode: latest
      java: 17
      cocoapods: default
      vars:
        BUNDLE_ID: "com.example.smartbin"
        CERTIFICATE_PATH: $CM_CERTIFICATE_PATH
        CERTIFICATE_PASSWORD: $CM_CERTIFICATE_PASSWORD
        PROVISIONING_PROFILE_PATH: $CM_PROVISIONING_PROFILE_PATH

    scripts:
      - echo "🔧 Setting up code signing..."
      - |
        keychain initialize
        security create-keychain -p "" build.keychain
        security default-keychain -s build.keychain
        security unlock-keychain -p "" build.keychain
        security import $CERTIFICATE_PATH -P $CERTIFICATE_PASSWORD -A
        security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "" build.keychain
        mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
        cp $PROVISIONING_PROFILE_PATH ~/Library/MobileDevice/Provisioning\ Profiles/

      - flutter doctor -v

      - |
        rm -rf ~/Library/Developer/Xcode/DerivedData
        flutter clean
        flutter pub get

      - |
        cd ios
        pod install --repo-update

      - |
        flutter build ipa --release --export-options-plist=ios/exportOptions.plist

    artifacts:
      - build/ios/iphoneos/*.ipa

    publishing:
      email:
        recipients:
          - "ramos.marklawrence.03042002@gmail.com"
        notify:
          success: true
          failure: false

      github:
        token: ${{ secrets.GITHUB_TOKEN }}
        tag: v1.0
        files:
          - build/ios/iphoneos/*.ipa
        body: "🚀 New iOS Release!"
