workflows:
  ios-release:
    name: "iOS Build"
    max_build_duration: 120
    environment:
      flutter: stable
      xcode: latest
      java: 17
      cocoapods: default
      vars:
        BUNDLE_ID: "com.example.smartbin"
        CERTIFICATE_PATH: $CM_CERTIFICATE_PATH
        CERTIFICATE_PASSWORD: $CM_CERTIFICATE_PASSWORD
        PROVISIONING_PROFILE_PATH: $CM_PROVISIONING_PROFILE_PATH

    artifacts:
      - build/ios/ipa/*.ipa    # iOS .ipa file for distribution
      - build/ios/ipa/*.app    # Optional: .app file for simulator testing
      - build/ios/archive/*.xcarchive  # Archive file for manual uploads
      - ios/Flutter/*.dSYM.zip # Debug symbols for crash reporting (e.g., Sentry, Firebase)
      - build/**/*.log         # Logs for troubleshooting

    publishing:
      email:
        recipients:
          - "ramos.marklawrence.03042002@gmail.com"
        notify:
          success: true
          failure: false
