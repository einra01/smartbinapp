workflows:
  my flow:
    name: "iOS Build"
    instance_type: mac_mini
    max_build_duration: 60

    scripts:
      - name: Clear cache
        script: |
          rm -rf ~/.pub-cache
          flutter clean

      - name: Install Flutter dependencies
        script: |
          flutter pub get

      - name: Install CocoaPods dependencies
        script: |
          cd ios
          pod install
          cd ..

      - name: Build iOS app
        script: |
          flutter build ios --release --no-codesign || exit 1

      - name: Debug build output
        script: |
          ls -R build/ios/

    artifacts:
      - build/ios/ipa/*.ipa
      - build/ios/archive/*.xcarchive
      - build/**/*.log

    publishing:
      email:
        recipients:
          - "ramos.marklawrence.03042002@gmail.com"
        notify:
          success: true
          failure: false
