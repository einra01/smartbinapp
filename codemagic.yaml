workflows:
  ios-workflow:
    name: iOS Build
    environment:
      flutter: stable
      xcode: latest
    scripts:
      - name: Ensure iOS Deployment Target is 13.0
        script: |
          cd ios
          sed -i '' "s/platform :ios, '12.0'/platform :ios, '13.0'/" Podfile
          pod install --repo-update
      - name: Get Flutter dependencies
        script: flutter pub get
      - name: Build iOS app
        script: flutter build ipa --release

    artifacts:
      - build/ios/ipa/*.ipa
