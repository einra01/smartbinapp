workflows:
  ios-release:
    name: "iOS Build"
    max_build_duration: 120
    environment:
      flutter: stable
      xcode: latest
      java: 17
      cocoapods: default
      vars:
        BUNDLE_ID: "com.example.smartbin"
        CERTIFICATE_PATH: $CM_CERTIFICATE_PATH
        CERTIFICATE_PASSWORD: $CM_CERTIFICATE_PASSWORD
        PROVISIONING_PROFILE_PATH: $CM_PROVISIONING_PROFILE_PATH

    scripts:
      - name: Install Flutter dependencies
        script: |
          flutter pub get

      - name: Install CocoaPods dependencies
        script: |
          cd ios
          pod install
          cd ..

      - name: Build iOS app
        script: |
          flutter build ios --release --no-codesign

    artifacts:
      - build/ios/ipa/*.ipa
      - build/ios/archive/*.xcarchive
      - ios/Flutter/*.dSYM.zip
      - build/**/*.log

    publishing:
      email:
        recipients:
          - "ramos.marklawrence.03042002@gmail.com"
        notify:
          success: true
          failure: false