workflows:
  my flow:
    name: "iOS Build"
    instance_type: mac_mini
    max_build_duration: 60

    scripts:
      - name: Clean project
        script: |
          flutter clean

      - name: Install Flutter dependencies
        script: |
          flutter pub get

      - name: Install CocoaPods dependencies
        script: |
          cd ios
          pod install
          cd ..

      - name: Build iOS app (No Signing)
        script: |
          flutter build ios --release --no-codesign

    artifacts:
      - build/ios/archive/*.xcarchive
      - build/**/*.log

    publishing:
      email:
        recipients:
          - "ramos.marklawrence.03042002@gmail.com"
        notify:
          success: true
          failure: false
