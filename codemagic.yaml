workflows:
  flutter_workflow:
    name: "Flutter Build"
    max_build_duration: 120
    environment:
      flutter: stable           # Use 'stable' or specify a version like '3.16.0'
      xcode: latest             # Latest Xcode for iOS builds
      java: 17                  # Java version compatible with Flutter
      vars:
        PACKAGE_NAME: "com.example.smartbin"  # Your Android app ID

    triggering:
      events:
        - push
        - tag
      branch_patterns:
        - pattern: "main"
          include: true
          source: true

    scripts:
      - name: Install Dependencies
        script: |
          flutter pub get
      - name: Build iOS IPA
        script: |
          xcode-project build-ipa \
            --workspace "$CM_BUILD_DIR/ios/$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME" \
            --no-codesign
          flutter build ipa --release --export-options-plist=ios/exportOptions.plist
      


    artifacts:
      - build/**/outputs/**/*.apk       # Android APK path
      - build/ios/iphoneos/*.ipa        # iOS IPA path

    publishing:
      email:
        recipients:
          - "ramos.marklawrence.03042002@gmail.com"
